name: Tag and Release on PR Merge

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  tag:
    name: Create Tag
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    outputs:
      tag: ${{ steps.tag-action.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Tag
        uses: David-Lor/action-tag-on-pr-merge@0.0.3
        id: tag-action
        with:
          push-tag: true
          tag-regex: '^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$'

      - name: Comment if no tag
        if: steps.tag-action.outputs.tag == ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: github.event.pull_request.number,
              body: '⚠️ No tag found. Add `Tags vX.Y.Z` to PR body for auto-release.'
            })

  build-and-release:
    name: Build and Release
    needs: tag
    if: needs.tag.outputs.tag != ''
    uses: ./.github/workflows/build-artifacts.yml
    with:
      version: ${{ needs.tag.outputs.tag }}

  publish-release:
    name: Publish Release
    needs: [tag, build-and-release]
    runs-on: ubuntu-latest
    if: needs.tag.outputs.tag != ''

    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@v8
        with:
          name: worfdog-${{ needs.tag.outputs.tag }}
          path: ./artifacts

      - name: Download DEB artifact
        uses: actions/download-artifact@v8
        with:
          name: worfdog-deb-${{ needs.tag.outputs.tag }}
          path: ./artifacts

      - name: Create Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ needs.tag.outputs.tag }}
          files: |
            ./artifacts/worfdog
            ./artifacts/worfdog_*.deb
          tag_name: ${{ needs.tag.outputs.tag }}
          generate_release_notes: true

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: github.event.pull_request.number,
              body: `✅ Release ${{ needs.tag.outputs.tag }} created!
            
            | Asset | Download |
            |-------|----------|
            | Binary | [worfdog](${{ steps.release.outputs.url }}) |
            | DEB Package | [worfdog_*_all.deb](${{ steps.release.outputs.url }}) |
            
            **Release URL:** ${{ steps.release.outputs.url }}
            
            The release includes:
            - Static binary for Linux amd64
            - DEB package (architecture-independent, works on all Debian/Ubuntu systems)
            - Systemd unit file`
            })
