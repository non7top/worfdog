name: Pre-Commit Checks

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-Commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
