name: PR Build Test

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read
  pull-requests: write

jobs:
  build-test:
    name: Build Test
    uses: ./.github/workflows/build-artifacts.yml
    with:
      version: pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}

  report:
    name: Report Build Status
    runs-on: ubuntu-latest
    needs: build-test
    if: always()

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ needs.build-test.result }}';
            const prNumber = context.issue.number;
            const sha = context.sha.substring(0, 7);
            const runId = '${{ github.run_id }}';
            const artifactsUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

            const body = status === 'success'
              ? `✅ **Build successful for PR #${prNumber}**

            | Artifact | Download |
            |----------|----------|
            | Binary | [worfdog-pr-${prNumber}-${sha}](${artifactsUrl}) |
            | DEB Package | [worfdog_*.deb](${artifactsUrl}) |

            **Version:** pr-${prNumber}-${sha}

            **Note:** Artifacts are uploaded as uncompressed files for faster download (GitHub Actions feature).
            Click on the artifact names above to download. Artifacts expire after 30 days.`
              : `❌ **Build failed for PR #${prNumber}**

            **Version:** pr-${prNumber}-${sha}

            Check the [workflow logs](${artifactsUrl}) for details.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
