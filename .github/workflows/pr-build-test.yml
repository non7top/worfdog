name: PR Build Test

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read
  pull-requests: write

jobs:
  build-test:
    name: Build Test
    uses: ./.github/workflows/build-artifacts.yml
    with:
      version: pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}

  report:
    name: Report Build Status
    runs-on: ubuntu-latest
    needs: build-test
    if: always()

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ needs.build-test.result }}';
            const prNumber = context.issue.number;
            const sha = context.sha.substring(0, 7);

            const body = status === 'success'
              ? `✅ **Build successful for PR #${prNumber}**

            | Artifact | Status |
            |----------|--------|
            | Binary | ✅ Built |
            | DEB Package | ✅ Built |

            **Version:** pr-${prNumber}-${sha}

            Artifacts are available in the workflow run.`
              : `❌ **Build failed for PR #${prNumber}**

            **Version:** pr-${prNumber}-${sha}

            Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
