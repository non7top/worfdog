version: 2
updates:
  # 1. Update Go dependencies (go.mod / go.sum)
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"

  # 2. Update GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # 3. Update pre-commit hooks (.pre-commit-config.yaml)
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
