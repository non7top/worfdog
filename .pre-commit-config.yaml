repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.1.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, chore, docs, style, refactor, test, ci, perf, revert]

  - repo: https://github.com/TekWizely/pre-commit-golang
    rev: v1.0.0-rc.4
    hooks:
      # Unique hooks NOT covered by golangci-lint
      - id: go-mod-tidy           # Ensure go.mod/go.sum are tidy
      - id: go-fumpt              # Stricter gofmt (auto-fix)
      - id: go-vulncheck-mod      # Security vulnerability scan

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.11.3
    hooks:
      - id: golangci-lint
        args: [--timeout=300s]
